<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task — SideQuest</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0e0f14;
            --surface:   #16181f;
            --surface2:  #1e2029;
            --border:    #2a2d3a;
            --accent:    #f0c040;
            --accent2:   #5b8cff;
            --success:   #3ecf6e;
            --danger:    #ff5b5b;
            --muted:     #555970;
            --text:      #e4e6f0;
            --subtext:   #8b8fa8;
            --mono:      'Space Mono', monospace;
            --sans:      'DM Sans', sans-serif;
            --radius:    10px;
            --radius-sm: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-family: var(--mono);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-decoration: none;
        }

        .logo span { color: var(--subtext); font-weight: 400; }

        .header-divider {
            color: var(--border);
            font-size: 1.2rem;
        }

        .header-title {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--subtext);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .main {
            max-width: 560px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .edit-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-col-full { grid-column: 1 / -1; }

        .field label {
            display: block;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--subtext);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 6px;
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            font-family: var(--sans);
            font-size: 0.875rem;
            outline: none;
            -webkit-appearance: none;
            transition: border-color 0.2s;
        }

        .field input:focus,
        .field textarea:focus,
        .field select:focus { border-color: var(--accent2); }

        .field input::placeholder,
        .field textarea::placeholder { color: var(--muted); }

        .field textarea { resize: vertical; min-height: 80px; }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--sans);
            font-size: 0.82rem;
            font-weight: 600;
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-ghost   { background: transparent; color: var(--subtext); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--text); }
    </style>
</head>
<body>

<header class="header">
    <a class="logo" href="/">SIDE<span>QUEST</span></a>
    <span class="header-divider">/</span>
    <span class="header-title">Edit Task</span>
</header>

<div class="main">
    <div class="edit-panel">
        <form method="post">
            <div class="form-grid">
                <div class="field form-col-full">
                    <label>Task Name</label>
                    <input type="text" name="name" value="{{ task.name }}" required>
                </div>

                <div class="field form-col-full">
                    <label>Description</label>
                    <textarea name="description">{{ task.description }}</textarea>
                </div>

                <div class="field form-col-full">
                    <label>Tags</label>
                    <input type="text" name="tags" value="{{ task.tags_text }}" placeholder="health, work, family">
                </div>

                <div class="field">
                    <label>Recurrence</label>
                    <select name="recurrence">
                        <option value="one_off"  {% if task.recurrence == "one_off"  %}selected{% endif %}>One-off</option>
                        <option value="daily"    {% if task.recurrence == "daily"    %}selected{% endif %}>Daily</option>
                        <option value="weekly"   {% if task.recurrence == "weekly"   %}selected{% endif %}>Weekly</option>
                        <option value="bi_weekly"{% if task.recurrence == "bi_weekly"%}selected{% endif %}>Bi-weekly</option>
                        <option value="monthly"  {% if task.recurrence == "monthly"  %}selected{% endif %}>Monthly</option>
                    </select>
                </div>

                <div class="field">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="1" {% if task.priority == 1 %}selected{% endif %}>Low</option>
                        <option value="2" {% if task.priority == 2 %}selected{% endif %}>Medium</option>
                        <option value="3" {% if task.priority == 3 %}selected{% endif %}>High</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Save Changes</button>
                <button class="btn btn-ghost" type="button" onclick="previewTask()">⚡ Evaluate</button>
                <a class="btn btn-ghost" href="/">Cancel</a>
            </div>

            <div id="previewResult" style="display:none;margin-top:14px;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                    <span style="font-family:var(--mono);font-size:0.65rem;color:var(--subtext);text-transform:uppercase;letter-spacing:.07em;">Alignment Score</span>
                    <span id="previewScore" style="font-family:var(--mono);font-size:0.8rem;color:#a855f7;font-weight:700;"></span>
                    <span id="previewPriority" style="font-family:var(--mono);font-size:0.62rem;padding:2px 7px;border-radius:999px;border:1px solid var(--accent);color:var(--accent);"></span>
                </div>
                <div id="previewReason" style="font-size:0.78rem;color:var(--subtext);font-style:italic;line-height:1.5;"></div>
            </div>
        </form>
    </div>
</div>

<script>
    async function previewTask() {
        const form = document.querySelector('form');
        const btn  = document.querySelector('button[onclick="previewTask()"]');
        const result = document.getElementById('previewResult');

        const name = form.querySelector('[name="name"]').value.trim();
        if (!name) { alert('Task name is required.'); return; }

        btn.textContent = '…';
        btn.disabled = true;
        result.style.display = 'none';

        const body = new URLSearchParams({
            name,
            description: form.querySelector('[name="description"]').value,
            tags:        form.querySelector('[name="tags"]').value,
            priority:    form.querySelector('[name="priority"]').value,
        });

        try {
            const res  = await fetch('/preview', { method: 'POST', body });
            const data = await res.json();

            if (data.error) {
                document.getElementById('previewScore').textContent    = '';
                document.getElementById('previewPriority').textContent = '';
                document.getElementById('previewReason').textContent   = data.error;
            } else {
                document.getElementById('previewScore').textContent    = data.score + ' / 100';
                document.getElementById('previewPriority').textContent = 'Suggested: ' + data.suggested_priority_label;
                document.getElementById('previewReason').textContent   = data.reason;
                form.querySelector('[name="priority"]').value = data.suggested_priority;
            }
            result.style.display = 'block';
        } catch (e) {
            document.getElementById('previewReason').textContent = 'Could not reach the evaluator.';
            result.style.display = 'block';
        }

        btn.textContent = '⚡ Evaluate';
        btn.disabled = false;
    }
</script>
</body>
</html>
